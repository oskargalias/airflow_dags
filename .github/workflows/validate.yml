name: Validate DAG repository

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python files
        run: python -m compileall -q .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
